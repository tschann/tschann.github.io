<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eqlizr — Browse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@400;500&family=Public+Sans:wght@300;400;500;900&family=Syne:wght@400;700;800&display=swap">
<style>
  /* ── RESET & BASE ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0e0f14;
    --surface:   #16181f;
    --border:    #2a2d38;
    --muted:     #3e4256;
    --mid:       #6a718a;
    --text:      #c8cdd8;
    --bright:    #ffffff;
    --accent:    #8dc7d2;
    --purple:    hsl(270, 70%, 58%);
    --blue:      hsl(210, 75%, 58%);
    --green:     hsl(145, 65%, 48%);
    --yellow:    hsl(48,  90%, 55%);
    --fuchsia:   hsl(320, 80%, 58%);
  }

  /* ── LIGHT MODE ── */
  html.light {
    --bg:        #ffffff;
    --surface:   #f4f5f8;
    --border:    #dde0ea;
    --muted:     #b0b5c8;
    --mid:       #7a8099;
    --text:      #2a2d3a;
    --bright:    #0e0f14;
    --accent:    #3a9db0;
    --purple:    hsl(270, 60%, 50%);
    --blue:      hsl(210, 70%, 46%);
    --green:     hsl(145, 60%, 36%);
    --yellow:    hsl(48,  85%, 40%);
    --fuchsia:   hsl(320, 70%, 48%);
  }

  html.light .range-track-bg { background: #d4d7e2; }

  html.light .slider-story  .range-track-fill { background: hsl(270, 60%, 50%); }
  html.light .slider-acting .range-track-fill { background: hsl(210, 70%, 46%); }
  html.light .slider-look   .range-track-fill { background: hsl(145, 60%, 36%); }
  html.light .slider-music  .range-track-fill { background: hsl(48,  85%, 40%); }
  html.light .slider-enjoy  .range-track-fill { background: hsl(320, 70%, 48%); }

  html.light .slider-story  .range-input::-webkit-slider-thumb,
  html.light .slider-story  .range-input::-moz-range-thumb  { background: hsl(270, 60%, 50%); }
  html.light .slider-acting .range-input::-webkit-slider-thumb,
  html.light .slider-acting .range-input::-moz-range-thumb  { background: hsl(210, 70%, 46%); }
  html.light .slider-look   .range-input::-webkit-slider-thumb,
  html.light .slider-look   .range-input::-moz-range-thumb  { background: hsl(145, 60%, 36%); }
  html.light .slider-music  .range-input::-webkit-slider-thumb,
  html.light .slider-music  .range-input::-moz-range-thumb  { background: hsl(48,  85%, 40%); }
  html.light .slider-enjoy  .range-input::-webkit-slider-thumb,
  html.light .slider-enjoy  .range-input::-moz-range-thumb  { background: hsl(320, 70%, 48%); }

  html.light .logo svg path,
  html.light .logo svg circle { stroke: var(--bright); }
  html.light .logo svg path:first-of-type { fill: var(--bright); stroke: none; }

  html.light .view-btn.active { background: var(--border); color: var(--bright); }
  html.light .tag-chip.active { background: var(--border); border-color: var(--accent); color: var(--accent); }
  html.light .film-poster-wrap::before {
    background: #f8fafb;
  }

  /* In dark mode, override #000 hardcoded colors to be light */
  html:not(.light) .film-card-title   { color: #ffffff; }
  html:not(.light) .film-card-year    { color: #c8cdd8; }
  html:not(.light) .film-card-director { color: #8a90a8; }

  html:not(.light) { --bme-stroke: #b0b8d0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
  }

  /* ── LAYOUT ── */
  .page {
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: auto 1fr;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    grid-column: 1 / -1;
    padding: 24px 28px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo svg { display: block; }

  .logo span {
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.1em;
    vertical-align: middle;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .view-toggle {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .view-btn {
    background: none;
    border: none;
    padding: 6px 10px;
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
    transition: background 0.15s, color 0.15s;
  }

  .view-btn.active {
    background: var(--border);
    color: var(--text);
  }

  .result-count {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    grid-column: 1;
    border-right: 1px solid var(--border);
    padding: 24px 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .filter-section-title {
    display:none;
    font-size: 9px;
    letter-spacing: 0em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

.filters-section-title {
    display:block;
    font-size: 14px;
    letter-spacing: 0em;
    font-family: 'Public Sans', sans-serif;
    color: var(--text);
    margin-bottom: 12px;
  }

  .tags-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    display:none
  }

  .tag-chip {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.05em;
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: none;
    color: var(--mid);
    cursor: pointer;
    transition: all 0.15s;
  }

  .tag-chip:hover { border-color: var(--mid); color: var(--text); }

  .tag-chip.active {
    background: var(--border);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── RATING BAR ALLOCATOR ── */
  .rating-sliders {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 280px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 10px;
  }

  .bar-row {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 0;
  }

  .bar-row-header {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    padding-right: 10px;
    min-width: 140px;
    flex-shrink: 0;
    gap: 1px;
  }

  .bar-row-label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    text-align: right;
    white-space: nowrap;
  }

  .bar-row-val {
    display: none;
  }

  .bar-chart {
    display: flex;
    gap: 3px;
    align-items: flex-end;
    height: 30px;
    cursor: pointer;
    user-select: none;
    padding: 2px 0;
    width: fit-content;
  }

  .bar-line {
    width: 5px;
    border-radius: 2px;
    flex-shrink: 0;
    transition: background 0.1s, height 0.1s;
  }

  .bar-line.on  { height: 100%; }
  .bar-line.off { height: 100%; opacity: 0.15; }

  /* Total pool bar */
  .bar-pool-wrap {
    padding-top: 6px;
    margin:0 auto;
    height: 42px;
    border-top: 1px solid var(--border);
  }

  .bar-pool-header {
    display: none;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }

  .bar-pool-label {
    font-size: 8px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .bar-pool-val {
    font-size: 9px;
    color: var(--mid);
    font-variant-numeric: tabular-nums;
  }

  .bar-pool-chart {
    display: flex;
    gap: 3px;
    align-items: flex-end;
    height: 30px;
    pointer-events: none;
  }

  .bar-pool-line {
    width: 5px;
    height:70%;
    border-radius: 2px;
    flex-shrink: 0;
    transition: background 0.08s;
  }

  .bar-pool-line.on  { height: 70%; background: var(--muted); }
  .bar-pool-line.off { height: 70%; background: var(--muted); opacity: 0.15; }

  /* Per-category line colors */
  .bar-story  .bar-line.on { background: hsl(270, 70%, 62%); }
  .bar-acting .bar-line.on { background: hsl(210, 75%, 62%); }
  .bar-look   .bar-line.on { background: hsl(145, 65%, 52%); }
  .bar-music  .bar-line.on { background: hsl(48,  90%, 58%); }
  .bar-enjoy  .bar-line.on { background: hsl(320, 80%, 62%); }

  /* Mood bar colors */
  .mood-thriller .bar-line.on { background: hsl(0,   70%, 58%); }
  .mood-romcom   .bar-line.on { background:  hsl(220, 98%, 70%); }
  .mood-comedy   .bar-line.on { background: hsl(45,  90%, 58%); }
  .mood-fun      .bar-line.on { background: hsl(45,  90%, 58%); }
  .mood-horror   .bar-line.on { background: hsl(280, 60%, 50%); }
  .mood-drama    .bar-line.on { background: hsl(231, 69%, 63%) }

  .mood-thriller .bar-line.off { background: hsl(0,   70%, 58%); }
  .mood-romcom   .bar-line.off { background:  hsl(196, 100%, 69%);}
  .mood-comedy   .bar-line.off { background: hsl(45,  90%, 58%); }
  .mood-fun      .bar-line.off { background: hsl(45,  90%, 58%); }
  .mood-horror   .bar-line.off { background: hsl(280, 60%, 50%); }
  .mood-drama    .bar-line.off { background: hsl(200, 65%, 55%); }

  .mood-thriller .bar-row-label { color: hsl(0,   70%, 65%); }
  .mood-romcom   .bar-row-label { color: hsl(220, 98%, 70%); }
  .mood-comedy   .bar-row-label { color: hsl(340, 72%, 65%);}
  .mood-fun      .bar-row-label { color: hsl(45,  90%, 65%); }
  .mood-horror   .bar-row-label { color: hsl(280, 60%, 65%); }
  .mood-drama    .bar-row-label { color:  hsl(231, 69%, 63%) }

  .bar-story  .bar-line.off { background: hsl(270, 70%, 62%); }
  .bar-acting .bar-line.off { background: hsl(210, 75%, 62%); }
  .bar-look   .bar-line.off { background: hsl(145, 65%, 52%); }
  .bar-music  .bar-line.off { background: hsl(48,  90%, 58%); }
  .bar-enjoy  .bar-line.off { background: hsl(320, 80%, 62%); }

  .bar-row-label.story  { color: hsl(270, 70%, 68%); }
  .bar-row-label.acting { color: hsl(210, 75%, 68%); }
  .bar-row-label.look   { color: hsl(145, 65%, 58%); }
  .bar-row-label.music  { color: hsl(48,  90%, 64%); }
  .bar-row-label.enjoy  { color: hsl(320, 80%, 68%); }

  .reset-btn {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
  }

  .reset-btn:hover { color: var(--text); border-color: var(--mid); }

  /* ── MAIN CONTENT ── */
  .main {
    grid-column: 2;
    padding: 24px 28px;
    overflow-y: auto;
  }

  /* ── GRID VIEW ── */
  .films-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    column-gap: 2px;
    row-gap: 16px;
  }

  .film-card-grid {
    overflow: hidden;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .film-card-grid:hover { opacity: .85; }

  .film-card-grid .film-card-text {
    opacity: .35;
    transition: opacity 0.15s;
  }

  .film-card-grid:hover .film-card-text { opacity: 1; }

  .film-poster-wrap {
    width: 100%;
    aspect-ratio: 2.2/3;
    overflow: hidden;
    position: relative;
    border-radius: 0;
  }

  .film-poster-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .film-poster-wrap img.loaded {
    opacity: 1;
  }

  /* Gray shimmer placeholder shown until image loads */
  .film-poster-wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    background: #1e2030;
    z-index: 0;
    transition: opacity 0.4s ease;
  }

  .film-poster-wrap.img-loaded::before {
    opacity: 0;
    pointer-events: none;
  }

  .film-poster-wrap img {
    position: relative;
    z-index: 1;
  }

  .poster-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-align: center;
    padding: 12px;
    line-height: 1.4;
    background: var(--border);
  }

  .film-card-body {
    position: relative;
    padding: 6px 0px 10px;
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    justify-content: space-between;
    gap: 6px;
  }

  .film-card-text {
    flex: 1;
    min-width: 0;
  }

  .film-card-title {
    font-family: 'Public Sans', sans-serif;
    font-size: 14px;
    font-weight: 900;
    color: #000;
    line-height: 1.1;
    letter-spacing: 0em;
    text-transform: uppercase;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .film-card-meta {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 0;
  }

  .film-card-year {
    font-family: 'Public Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: #000;
  }

  .film-card-director {
    font-family: 'Public Sans', sans-serif;
    font-size: 12px;
    font-weight: 300;
    color: #939393;
  }

  .bme-sparkline {
    width: 30px;
    height: 30px;
    flex-shrink: 0;
    right: 9px;
    bottom: 0;
    position: absolute;
    display: block;
    overflow: hidden;
  }

  .film-rating-bars {
    display: flex;
    gap: 3px;
    align-items: flex-end;
    height: 24px;
  }

  .rating-bar-mini {
    flex: 1;
    border-radius: 1px 1px 0 0;
    min-height: 2px;
    position: relative;
  }

  .rating-bar-mini::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1.5px;
    background: inherit;
    filter: brightness(2.2) saturate(1.4);
    border-radius: 1px;
  }

  /* ── LIST VIEW ── */
  .films-list { display: flex; flex-direction: column; gap: 1px; }

  .film-card-list {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 44px 1fr auto;
    gap: 14px;
    align-items: center;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .film-card-list:hover { border-color: var(--mid); }

  .list-poster {
    width: 44px;
    height: 66px;
    border-radius: 4px;
    overflow: hidden;
    background: var(--border);
    flex-shrink: 0;
  }

  .list-poster img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .list-poster-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 7px;
    color: var(--muted);
    text-align: center;
  }

  .list-info { min-width: 0; }

  .list-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--bright);
    letter-spacing: 0.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }

  .list-meta {
    font-size: 9px;
    color: var(--mid);
    letter-spacing: 0.04em;
    margin-bottom: 8px;
  }

  .list-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .list-tag {
    font-size: 8px;
    letter-spacing: 0.04em;
    padding: 2px 6px;
    border-radius: 3px;
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .list-ratings {
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 80px 20px;
    color: var(--muted);
    text-align: center;
  }

  .empty-state-icon { font-size: 32px; opacity: 0.3; }
  .empty-state-text { font-size: 11px; letter-spacing: 0.06em; }

  @media (min-width: 1200px) {
    .main {
      padding-left: 80px;
      padding-right: 80px;
    }
  }
</style>
</head>

  <!-- HEADER -->

    <div class="logo">

    chip.textContent = genre;
    chip.addEventListener('click', () => {
      if (activeGenres.has(genre)) { activeGenres.delete(genre); chip.classList.remove('active'); }
      else { activeGenres.add(genre); chip.classList.add('active'); }
      render();
    });
    genreList.appendChild(chip);
  });

  const allTags = [...new Set(FILMS_DATA.flatMap(f => f.tags))].sort();
  const tagsList = document.getElementById('tags-list');
  const TAG_LIMIT = 20;
  let tagsExpanded = false;

  function buildTagChips() {
    tagsList.innerHTML = '';
    const visible = tagsExpanded ? allTags : allTags.slice(0, TAG_LIMIT);
    visible.forEach(tag => {
      const chip = document.createElement('button');
      chip.className = 'tag-chip' + (activeTags.has(tag) ? ' active' : '');
      chip.textContent = tag;
      chip.addEventListener('click', () => {
        if (activeTags.has(tag)) { activeTags.delete(tag); chip.classList.remove('active'); }
        else { activeTags.add(tag); chip.classList.add('active'); }
        render();
      });
      tagsList.appendChild(chip);
    });

    if (allTags.length > TAG_LIMIT) {
      const toggle = document.createElement('button');
      toggle.className = 'tag-chip';
      toggle.style.cssText = 'color:var(--accent);border-color:var(--accent);margin-top:2px';
      toggle.textContent = tagsExpanded ? '− less' : `+ ${allTags.length - TAG_LIMIT} more`;
      toggle.addEventListener('click', () => {
        tagsExpanded = !tagsExpanded;
        buildTagChips();
      });
      tagsList.appendChild(toggle);
    }
  }

  buildTagChips();

  // ── BAR ALLOCATOR STATE ──
  // bars[key] = number of lit bars (0–20). Start at 10 each = 50 points used of 100 total.
  const TOTAL_POOL = 25;    // shared pool bars
  const BARS_PER   = 10;    // max bars per rating (up to 10 per cat, 25 pool total)
  const POOL_BARS  = 25;    // bars in the total strip
  const clsMap = { story: 'story', acting: 'acting', lookFeel: 'look', music: 'music', enjoyment: 'enjoy' };

  let bars = {};
  RATING_FIELDS.forEach(f => { bars[f.key] = 1; });

  // Mood bars — separate 25-point pool, same mechanics
  const MOOD_POOL = 25;
  const MOOD_BARS_PER = 10;
  let moodBars = {};
  MOOD_FIELDS.forEach(f => { moodBars[f.key] = 0; });  // start: 1 bar each = 5 used, 20 remaining
  // sliderRanges is still used by getFilteredFilms; sync it from bars
  RATING_FIELDS.forEach(f => { sliderRanges[f.key] = [0, 100]; });

  function barsToThreshold(b) {
    // b lit bars out of 20 → minimum rating threshold (0–100)
    return b * 10;  // 10 bars × 10 = 100 max threshold
  }

  function syncSliderRanges() {
    RATING_FIELDS.forEach(({ key }) => {
      sliderRanges[key] = [barsToThreshold(bars[key]), 100];
    });
  }

  function totalUsed() {
    return RATING_FIELDS.reduce((s, { key }) => s + bars[key], 0);
  }

  // Steal one bar from the category with the most lit bars (other than `skipKey`)
  function stealOne(skipKey) {
    let maxKey = null, maxVal = -1;
    RATING_FIELDS.forEach(({ key }) => {
      if (key !== skipKey && bars[key] > maxVal) { maxVal = bars[key]; maxKey = key; }
    });
    if (maxKey !== null && bars[maxKey] > 0) { bars[maxKey]--; return true; }
    return false;
  }

  // Build UI
  function buildBarLines(key, container, count, isPool) {
    container.innerHTML = '';
    const total = isPool ? POOL_BARS : BARS_PER;
    for (let i = 0; i < total; i++) {
      const line = document.createElement('div');
      line.className = (isPool ? 'bar-pool-line' : 'bar-line') + (i < count ? ' on' : ' off');
      container.appendChild(line);
    }
  }

  // ── MOOD BAR BUILDER ──
  function totalMoodUsed() {
    return MOOD_FIELDS.reduce((s, { key }) => s + moodBars[key], 0);
  }

  function stealOneMood(skipKey) {
    let maxKey = null, maxVal = -1;
    MOOD_FIELDS.forEach(({ key }) => {
      if (key !== skipKey && moodBars[key] > maxVal) { maxVal = moodBars[key]; maxKey = key; }
    });
    if (maxKey !== null && moodBars[maxKey] > 0) { moodBars[maxKey]--; return true; }
    return false;
  }

  function renderAllMoodBars() {
    MOOD_FIELDS.forEach(({ key }) => {
      const chart = document.getElementById(`moodchart-${key}`);
      if (chart) buildBarLines(key, chart, moodBars[key], false);
    });
    const pool = document.getElementById('mood-pool-chart');
    if (pool) buildBarLines(null, pool, MOOD_POOL - totalMoodUsed(), true);
    const poolVal = document.getElementById('mood-pool-val');
    if (poolVal) poolVal.textContent = `${MOOD_POOL - totalMoodUsed()}`;
    render();
  }

  const moodContainer = document.getElementById('mood-sliders');

  MOOD_FIELDS.forEach(({ key, label, cls }) => {
    const row = document.createElement('div');
    row.className = `bar-row mood-bar ${cls}`;
    row.innerHTML = `
      <div class="bar-row-header">
        <span class="bar-row-label ${cls}">${label}</span>
      </div>
      <div class="bar-chart" id="moodchart-${key}"></div>`;
    moodContainer.appendChild(row);

    const chart = row.querySelector(`#moodchart-${key}`);
    buildBarLines(key, chart, moodBars[key], false);

    chart.addEventListener('click', e => {
      const rect = chart.getBoundingClientRect();
      const isRight = (e.clientX - rect.left) >= rect.width / 2;
      if (isRight) {
        if (moodBars[key] < MOOD_BARS_PER) {
          if (totalMoodUsed() < MOOD_POOL) { moodBars[key]++; }
          else { if (stealOneMood(key)) moodBars[key]++; }
        }
      } else {
        if (moodBars[key] > 0) moodBars[key]--;
      }
      renderAllMoodBars();
    });
  });

  // Mood pool strip
  const moodPoolWrap = document.createElement('div');
  moodPoolWrap.className = 'bar-pool-wrap';
  moodPoolWrap.innerHTML = `
    <div class="bar-pool-header">
      <span class="bar-pool-label">Total</span>
      <span class="bar-pool-val" id="mood-pool-val">${MOOD_POOL}</span>
    </div>
    <div class="bar-pool-chart" id="mood-pool-chart"></div>`;
  moodContainer.appendChild(moodPoolWrap);
  buildBarLines(null, moodPoolWrap.querySelector('#mood-pool-chart'), MOOD_POOL - totalMoodUsed(), true);

  function getFilteredFilms() {
    const filtered = FILMS_DATA.filter(film => {
      for (const genre of activeGenres) { if (!film.genre.includes(genre)) return false; }
      for (const tag   of activeTags)   { if (!film.tags.includes(tag))    return false; }
      for (const { key } of MOOD_FIELDS) {
        const threshold = barsToThreshold(moodBars[key]);
        if ((film.mood ? film.mood[key] : 0) < threshold) return false;
      }
      return true;
    });

    // Sort by weighted score: each rating weighted by its bar count
    // so dragging Story bars up pushes high-Story films to the front
    const totalBars = RATING_FIELDS.reduce((s, { key }) => s + bars[key], 0) || 1;
    filtered.sort((a, b) => {
      const scoreA = RATING_FIELDS.reduce((s, { key }) => s + a.ratings[key] * bars[key], 0) / totalBars;
      const scoreB = RATING_FIELDS.reduce((s, { key }) => s + b.ratings[key] * bars[key], 0) / totalBars;
      return scoreB - scoreA;
    });

    return filtered;
  }

  function renderBmeSparkline(bme) {
    const W = 30, H = 30, PAD = 2;
    const xs = [PAD, W / 2, W - PAD];
    const ys = bme.map(v => PAD + (1 - v / 100) * (H - PAD * 2));
    const cp1x = (xs[0]+xs[1])/2, cp1y = ys[0];
    const cp2x = (xs[0]+xs[1])/2, cp2y = ys[1];
    const cp3x = (xs[1]+xs[2])/2, cp3y = ys[1];
    const cp4x = (xs[1]+xs[2])/2, cp4y = ys[2];
    const linePath = `M ${xs[0]} ${ys[0]} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${xs[1]} ${ys[1]} C ${cp3x} ${cp3y}, ${cp4x} ${cp4y}, ${xs[2]} ${ys[2]}`;
    const areaPath = `${linePath} L ${xs[2]} ${H} L ${xs[0]} ${H} Z`;
    const gradId = `bmeGrad-${bme.join('-')}`;
    return `<svg class="bme-sparkline" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <defs><linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#5151F3" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="#5151F3" stop-opacity="0.02"/>
      </linearGradient></defs>
      <path d="${areaPath}" fill="url(#${gradId})"/>
      <path d="${linePath}" fill="none" stroke="var(--bme-stroke, #111)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;
  }

  function renderGridCard(film) {
    const posterHTML = film.poster
      ? `<img src="${film.poster}" alt="${film.title}">`
      : `<div class="poster-placeholder">${film.title}</div>`;
    const parts = film.director.split(' ');
    const lastName = parts.pop();
    const firstInitial = parts.length > 0 ? parts[0][0] + '.' : '';
    const directorDisplay = firstInitial ? `${firstInitial} ${lastName}` : lastName;
    return `<div class="film-card-grid" data-id="${film.id}">
      <div class="film-poster-wrap">${posterHTML}</div>
      <div class="film-card-body">
        <div class="film-card-text">
          <div class="film-card-title">${film.title}</div>
          <div class="film-card-meta">
            <span class="film-card-year">${film.year}</span>
            <span class="film-card-director">${directorDisplay}</span>
          </div>
        </div>
        ${renderBmeSparkline(film.bme)}
      </div>
    </div>`;
  }

  function renderListCard(film) {
    const posterHTML = film.poster
      ? `<img src="${film.poster}" alt="${film.title}">`
      : `<div class="list-poster-placeholder">No poster</div>`;
    const genreHTML = film.genre.map(g => `<span class="list-tag" style="color:var(--accent);border-color:var(--border)">${g}</span>`).join('');
    const tagsHTML  = film.tags.map(t => `<span class="list-tag">${t}</span>`).join('');
    return `<div class="film-card-list">
      <div class="list-poster">${posterHTML}</div>
      <div class="list-info">
        <div class="list-title">${film.title}</div>
        <div class="list-meta">${film.year} · ${film.director}</div>
        <div class="list-tags">${genreHTML}${tagsHTML}</div>
      </div>
      <div class="list-ratings"><div style="width:100px;flex-shrink:0">${renderBmeSparkline(film.bme)}</div></div>
    </div>`;
  }

  function filtersActive() {
    if (activeGenres.size > 0 || activeTags.size > 0) return true;
    // Default is 10 bars each — only "active" if any differ from default
    return RATING_FIELDS.some(({ key }) => bars[key] !== 1) || MOOD_FIELDS.some(({ key }) => moodBars[key] !== 0);
  }

  // ── FLIP animation helpers ──
  function recordPositions(container) {
    const map = {};
    container.querySelectorAll('[data-id]').forEach(el => {
      const r = el.getBoundingClientRect();
      map[el.dataset.id] = { x: r.left, y: r.top };
    });
    return map;
  }

  function playFlip(container, before) {
    container.querySelectorAll('[data-id]').forEach(el => {
      const id = el.dataset.id;
      if (!before[id]) return; // new card — just fade in
      const r = el.getBoundingClientRect();
      const dx = before[id].x - r.left;
      const dy = before[id].y - r.top;
      if (Math.abs(dx) < 1 && Math.abs(dy) < 1) return; // didn't move
      el.animate([
        { transform: `translate(${dx}px, ${dy}px)`, opacity: 0.6 },
        { transform: 'translate(0, 0)', opacity: 1 }
      ], { duration: 380, easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)', fill: 'none' });
    });
  }

  function render() {
    const films = getFilteredFilms();
    const grid  = document.getElementById('films-grid');
    const list  = document.getElementById('films-list');
    const empty = document.getElementById('empty-state');
    const count = document.getElementById('result-count');
    count.textContent = `${films.length} film${films.length !== 1 ? 's' : ''}`;
    if (films.length === 0 && filtersActive()) {
      grid.classList.add('hidden'); list.classList.add('hidden'); empty.classList.remove('hidden'); return;
    }
    empty.classList.add('hidden');
    if (currentView === 'grid') {
      // Snapshot positions before re-render
      const before = recordPositions(grid);
      const prevIds = new Set([...grid.querySelectorAll('[data-id]')].map(el => el.dataset.id));
      const newIds  = new Set(films.map(f => f.id));
      const sameSet = films.length === prevIds.size && films.every(f => prevIds.has(f.id));

      grid.innerHTML = films.map(renderGridCard).join('');
      list.innerHTML = '';
      grid.classList.remove('hidden');
      list.classList.add('hidden');

      // Only FLIP-animate if the same cards are present (reordering), not when adding/removing
      if (sameSet && Object.keys(before).length > 0) {
        playFlip(grid, before);
      }
    } else {
      list.innerHTML = films.map(renderListCard).join('');
      grid.innerHTML = '';
      list.classList.remove('hidden');
      grid.classList.add('hidden');
    }
    cascadeImages();
  }

  let firstLoad = true;

  function cascadeImages() {
    const STAGGER = 40;
    const container = currentView === 'grid'
      ? document.getElementById('films-grid')
      : document.getElementById('films-list');

    container.querySelectorAll('.film-poster-wrap').forEach((wrap, i) => {
      const img = wrap.querySelector('img');
      if (!img) return;

      if (!firstLoad) {
        // After first load: reveal immediately, no cascade
        img.classList.add('loaded');
        wrap.classList.add('img-loaded');
        return;
      }

      const reveal = () => {
        setTimeout(() => {
          img.classList.add('loaded');
          wrap.classList.add('img-loaded');
        }, i * STAGGER);
      };

      if (img.complete && img.naturalWidth > 0) {
        reveal();
      } else {
        img.addEventListener('load', reveal, { once: true });
        img.addEventListener('error', () => {
          setTimeout(() => wrap.classList.add('img-loaded'), i * STAGGER);
        }, { once: true });
      }
    });

    if (firstLoad) {
      // Mark first load done after all stagger timers would have fired
      const cardCount = container.querySelectorAll('.film-poster-wrap').length;
      setTimeout(() => { firstLoad = false; }, cardCount * STAGGER + 600);
    }
  }

  function setView(v) {
    currentView = v;
    document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
    document.getElementById('btn-list').classList.toggle('active', v === 'list');
    render();
  }

  function resetFilters() {
    activeGenres.clear(); activeTags.clear();
    document.querySelectorAll('#genre-list .tag-chip').forEach(c => c.classList.remove('active'));
    buildTagChips();
    RATING_FIELDS.forEach(({ key }) => { bars[key] = 1; });
    MOOD_FIELDS.forEach(({ key }) => { moodBars[key] = 0; });
    renderAllMoodBars();
    render();
  }

  // Resolve tmdb: poster IDs
  const TMDB_API_KEY = '8265bd1679663a7ea12ac168da84d2e8';
  const tmdbFilms = FILMS_DATA.filter(f => f.poster && f.poster.startsWith('tmdb:'));
  if (tmdbFilms.length > 0) {
    Promise.all(tmdbFilms.map(film => {
      const id = film.poster.replace('tmdb:', '');
      return fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${TMDB_API_KEY}`)
        .then(r => r.json())
        .then(d => { film.poster = d.poster_path ? `https://image.tmdb.org/t/p/w500${d.poster_path}` : null; })
        .catch(() => { film.poster = null; });
    })).then(() => render());
  } else { render(); }
</script>
<script>
  (function applyTheme() {
    const now = new Date();
    const cstOffset = -6 * 60;
    const utcMinutes = now.getUTCHours() * 60 + now.getUTCMinutes();
    const cstMinutes = ((utcMinutes + cstOffset) % (24 * 60) + 24 * 60) % (24 * 60);
    const cstHour = cstMinutes / 60;
    const isDay = cstHour >= 6 && cstHour < 19;
    document.documentElement.classList.toggle('light', isDay);
    const nextBoundary = isDay
      ? (19 * 60 - cstMinutes) * 60 * 1000
      : ((cstMinutes < 6 * 60 ? 6 * 60 - cstMinutes : 24 * 60 - cstMinutes + 6 * 60) * 60 * 1000);
    setTimeout(applyTheme, Math.max(nextBoundary, 1000));
  })();
</script>
